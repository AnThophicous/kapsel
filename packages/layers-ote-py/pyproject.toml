[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "layers-kapsel"
version = "1.1.0"
description = "Layer bridge for Kapsel-backed .env proxy workflows."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
keywords = ["kapsel", "layers", "env", "secret", "bridge", "dotenv"]

[tool.setuptools]
packages = ["layers_ote"]
